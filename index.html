<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Strona w trakcie serwisu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #4CAF50;
        }
        p {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚧 Strona w trakcie serwisu</h1>
        <p>Przepraszamy za utrudnienia.</p>
    </div>
</body>
</html>
